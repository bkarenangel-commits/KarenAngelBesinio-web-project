<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Karen Angel Besinio - Personal Web Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Poppins', sans-serif;
      background:linear-gradient(135deg,#6a0dad,#1e3a8a); /* Purple to blue */
    }

    .card{
      display:flex;
      align-items:center;
      gap:20px;
      background:#fff;
      border-radius:16px;
      padding:24px 32px;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
      max-width:600px;
      width:90%;
      border:2px solid #6a0dad; /* Purple border */
    }

    .avatar{
      width:100px;
      height:100px;
      border-radius:50%;
      background:linear-gradient(180deg,#6a0dad,#1e3a8a); /* Purple to blue gradient */
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:28px;
      font-weight:700;
      flex-shrink:0;
    }

    .info{
      text-align:left;
      flex:1;
    }

    .info h1{
      margin:0;
      font-size:1.4rem;
      color:#111827;
    }

    .info p{
      margin:4px 0;
      color:#6b7280;
    }

    .info .role{
      font-weight:600;
      color:#6a0dad; /* Purple accent */
    }

    .contact{
      margin-top:8px;
      color:#6b7280;
    }

    .contact i{
      color:#6a0dad; /* Purple icons */
      margin-right:6px;
    }

    .contact div{
      margin:4px 0;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="avatar">KB</div>

    <div class="info">
      <h1>Karen Angel Besinio</h1>
      <p class="role">Student / Aspiring Developer</p>
      <p>Personal Web Page</p>

      <div class="contact">
        <div><i class="fa-solid fa-phone"></i> +63 09123456789</div>
        <div><i class="fa-solid fa-envelope"></i> karenangelbesinio@email.com</div>
        <div><i class="fa-solid fa-globe"></i> github.com/karenangelbesinio</div>
        <div><i class="fa-solid fa-location-dot"></i> Pontevedra, Capiz</div>
      </div>
    </div>
  </div>
</body>
</html>
